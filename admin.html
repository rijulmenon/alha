<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALHA Admin Portal</title>
    <link rel="stylesheet" href="admin.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>ALHA Admin Portal</h1>
                <p>Enter your credentials to continue</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <input 
                        type="email" 
                        id="adminEmail" 
                        name="email" 
                        placeholder="admin@yourdomain.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input 
                        type="password" 
                        id="adminPassword" 
                        name="password" 
                        placeholder="Enter password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                <div id="loginError" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="dashboard-container" style="display: none;">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1>ALHA Admin Portal</h1>
                <div class="header-actions">
                    <span class="admin-badge">Admin</span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="dashboard-main">
            <!-- Sidebar Navigation -->
            <aside class="dashboard-sidebar">
                <nav class="sidebar-nav">
                    <button class="nav-item active" data-section="events">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <span>Events</span>
                    </button>
                    <button class="nav-item" data-section="small-quantity">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span>Single Orders</span>
                    </button>
                    <button class="nav-item" data-section="journal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        <span>Journal</span>
                    </button>
                </nav>
            </aside>

            <!-- Content Area -->
            <main class="dashboard-content">
                <!-- Events Section -->
                <section id="eventsSection" class="content-section active">
                    <div class="section-header">
                        <h2>Events Management</h2>
                        <button class="btn-primary" id="addEventBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Event
                        </button>
                    </div>
                    <div id="eventsGrid" class="items-grid">
                        <div class="loading-spinner">Loading events...</div>
                    </div>
                </section>

                <!-- Single Orders Section -->
                <section id="smallQuantitySection" class="content-section">
                    <div class="section-header">
                        <h2>Single Orders Management</h2>
                        <button class="btn-primary" id="addSmallQuantityBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Product
                        </button>
                    </div>
                    <div id="smallQuantityGrid" class="items-grid">
                        <div class="loading-spinner">Loading products...</div>
                    </div>
                </section>

                <!-- Journal Section -->
                <section id="journalSection" class="content-section">
                    <div class="section-header">
                        <h2>Journal Management</h2>
                        <button class="btn-primary" id="addJournalBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Journal Entry
                        </button>
                    </div>
                    <div id="journalGrid" class="items-grid">
                        <div class="loading-spinner">Loading journal entries...</div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Modal for Add/Edit Forms -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Item</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Form content will be inserted here dynamically -->
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification" style="display: none;">
        <span id="notificationMessage"></span>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-client.js"></script>
    <script src="js/products-service.js"></script>
    <script src="js/journal-service.js"></script>
    <script src="js/admin-service.js"></script>
    <script src="admin.js"></script>
</body>
</html>
